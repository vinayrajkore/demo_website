<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Layout</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    font-family:Arial, sans-serif;
    padding:10px;
    background-color: #EEF3FA;
}
.container{
    width:100%;
    border:2px solid #000;
}
.header{
    display:flex;
   justify-content:space-between;
    align-items:center;
      
    border-bottom:2px solid #000;
     background-color:  #EEF3FA;
     border-bottom: solid 25px #1B4F8A;
     
}
/* .logo{
    width:120px;
    height:60px;
    background:#ddd;
    text-align:center;
    line-height:60px;
} */
.logo{
  width: 200px;        /* set whatever width you need */
  height: 120px;        /* match your navbar height */
  display: flex;
  align-items: center;
}

.logo img {
  width: 100%;
  height: 100%;
  object-fit: contain;  /* ← this is the key */
}

.menu{
    width:600px;
    height:40px;
    
    text-align:center;
    line-height:40px;
    
}
.menu li{
    display:inline-block;
    margin-left:20px;
}
.menu a{
    text-decoration:none;
    color:#1B4F8A;

    font-weight:bold; 
    font-size: 20px;  
}
.menu a:hover{
    color:#FFAD42;  
}
.banner{
    height: 350px;
     border-bottom:2px solid #000;
     display:flex inline;
     justify-content:center;
    align-items:center;
    font-size:24px;
    border-top: solid 5px #ffffff;
    border-bottom:solid 10px #1B4F8A;
    
   
}
.banner img{
  width: 100%;
  height: 100%;
  object-fit: contain;  /* ← this is the key */

}
.content{
    display:flex;
    padding:20px;
    gap:20px;
    border-bottom:2px solid #000;
}
.left{
    width:30%;
    background-color: aquamarine;
}
.small-box{
    height:120px;
     border:2px solid #000;
     margin-bottom:20px;
    display:flex;
     justify-content:center;
    align-items:center;
}

.banner {
  width: 100%;
  min-height: 600px;
  background: #EEF3FA;
  /* box-sizing: border-box; */
  overflow: hidden     
}

.banner img{
    width: 100%;
    height: 100%;
}

.right{
    width:70%;
    border:2px solid #000;
    min-height:260px;
    display:flex;
    justify-content:center;
    align-items:center;
    background-color: burlywood;
}
.footer-boxes{
    display:flex;
    justify-content:space-around;
    padding:20px;
    border-bottom:2px solid #000;
}
.footer-box{
    width:22%;
    height:120px;
    border:2px solid #000;
    display:flex;
    justify-content:center;
    align-items:center;
    background-color: chocolate;
}
.copyright{
    text-align:center;
    padding:15px;
}

@media(max-width:768px){
    .content{
        flex-direction:column;
    }
    .left,
    .right{
        width:100%;
    }
    .footer-boxes{
        flex-wrap:wrap;
        gap:15px;
    }
    .footer-box{
        width:48%;
    }
}

@media(max-width:480px){
    .header{
        flex-direction:column;
        gap:15px;
    }
    .menu{
        width:100%;
    }
    .footer-box{
        width:100%;
        background: brown;
    }
    .banner{
        height:100px;
        font-size:18px;
                background-color: blueviolet;
    }
 
    
    
}
</style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo"><img src="final logo.png"></div>
            <div class="name"><h1 style="color: #1B4F8A;">KORE TRAVELS BOOKING</h1></div>
            <div class="menu">
                
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
            </div>
        </div>
        <div class="banner">
           <img src="family banner.png" alt="Our Banner">
           <img src="family banner.png" alt="Our Banner">
           
                 
               
        </div>

        <div class="content">
            <div class="left">
                <div class="small-box">Box 1</div>
                <div class="small-box">Box 2</div>
            </div>
            <div class="right">
                Main Content Area
            </div>
        </div>

        <div class="footer-boxes">
            <div class="footer-box">1</div>
            <div class="footer-box">2</div>
            <div class="footer-box">3</div>
            <div class="footer-box">4</div>
        </div>

        <div class="copyright">
            © 2026 Your Website Name
        </div>

    </div>
</body>
</html>
